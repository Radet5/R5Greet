[background]
path = "/etc/r5greet/background.jpg"
fit = "cover"

[clock]
format = "%a %H:%M"
# timezone = "America/New_York"

# [commands] is deprecated — use [[actions]] instead.
# If only [commands] is present, it is automatically converted to a single
# Power Off action for backwards compatibility.

[[actions]]
name = "Power Off"
icon = "system-shutdown-symbolic"
command = "systemctl poweroff"

# [[actions]]
# name = "Reboot"
# icon = "system-reboot-symbolic"
# command = "systemctl reboot"

# [[actions]]
# name = "Suspend"
# icon = "system-suspend-symbolic"
# command = "systemctl suspend"

[session]
command = "uwsm start hyprland-uwsm.desktop"
env = []

[theme]
# panel_bg = "rgba(204, 204, 204, 0.1)"
panel_bg = "radial-gradient(at 10% 10%, rgba(204, 204, 204, 0.07) 40%, rgba(204, 204, 204, 0.30));"
panel_border = "#83d4ff"
# panel_radius = "10px"
# panel_shadow = "6px 6px 4px rgba(0, 0, 0, 0.25)"
input_bg = "rgba(61, 61, 61, 0.3)"
input_border = "rgba(131, 212, 255, 0.5)"
# input_radius = "10px"
text_color = "#c2fcff"
font_family = "Jura"
# font_size = "40px"
# font_weight = "500"
clock_font_family = "Jura"
# clock_font_size = "40px"
# clock_font_weight = "500"
# error_color = "#ff6b6b"
# custom_css = "/etc/r5greet/custom.css"

[users]
list = ["radet"]
