# R5Greet — Hyprland config for greetd
# Place this at /etc/greetd/r5greet-hyprland.conf or similar
# Set greetd config to: command = "start-hyprland -- -c /etc/greetd/r5greet-hyprland.conf"

exec-once = r5greet; hyprctl dispatch exit

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

decoration {
    blur {
        enabled = true
        size = 12
        passes = 3
    }
}

# Blur the greeter layer surface
layerrule = blur on, match:namespace = panel
layerrule = blur_popups on, match:namespace = panel
layerrule = ignore_alpha 0.0, match:namespace = panel
