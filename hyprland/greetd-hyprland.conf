# R5Greet — Hyprland config for greetd
# Place this at /etc/greetd/r5greet-hyprland.conf or similar
# Set greetd config to: command = "Hyprland -c /etc/greetd/r5geet-hyprland.conf"

exec-once = r5greet; hyprctl dispatch exit

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Blur the greeter layer surface
layerrule = blur, match:namespace:r5greet
layerrule = blurpopups, match:namespace:r5greet
layerrule = ignorezero, match:namespace:r5greet
