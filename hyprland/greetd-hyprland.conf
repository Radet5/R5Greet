# R5Greet — Hyprland config for greetd
# Place this at /etc/greetd/r5greet-hyprland.conf or similar
# Set greetd config to: command = "start-hyprland -- -c /etc/greetd/r5greet-hyprland.conf"

exec-once = r5greet; hyprctl dispatch exit

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

decoration {
    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

# Blur the greeter panels
layerrule = blur on, match:namespace r5greet
layerrule = ignore_alpha 0.07, match:namespace r5greet
